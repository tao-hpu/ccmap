name = "ccmap"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Create with:  npx wrangler kv namespace create USERS
# then paste the printed id below.
[[kv_namespaces]]
binding = "USERS"
id = "REPLACE_WITH_KV_ID"

# Set the write gate with:  npx wrangler secret put PUSH_SECRET
# (clients send it as `ccmap config --token <secret>`)
[vars]
# PUSH_SECRET is a secret, not a var — set via `wrangler secret put`.
